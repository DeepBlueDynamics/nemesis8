version: "3.8"

services:
  nemisis8:
    build:
      context: .
      dockerfile: Dockerfile
    image: nemisis8:latest
    container_name: nemisis8
    networks:
      - gnosis-network
    volumes:
      - nemesis8-home:/opt/nemesis8
      # Hyperia drops paste-screenshots into ~/.hyperia/assets on the host.
      # Mounting them read-only at /host/paste means the agent can read them
      # via `llm -a /host/paste/<id>.png` after the renderer's pathTranslate
      # rewrites the host path into the container's namespace.
      - ${USERPROFILE:-${HOME}}/.hyperia/assets:/host/paste:ro
    environment:
      - CODEX_UNSAFE_ALLOW_NO_SANDBOX=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true

networks:
  gnosis-network:
    external: true

volumes:
  nemesis8-home:
