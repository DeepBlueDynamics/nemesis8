version: "3.8"

services:
  nemisis8:
    build:
      context: .
      dockerfile: Dockerfile
    image: nemisis8:latest
    container_name: nemisis8
    networks:
      - gnosis-network
    volumes:
      - nemesis8-home:/opt/nemesis8
    environment:
      - CODEX_UNSAFE_ALLOW_NO_SANDBOX=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true

networks:
  gnosis-network:
    external: true

volumes:
  nemesis8-home:
