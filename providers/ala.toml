[provider]
name = "ala"
aliases = ["local"]
binary = "/opt/mcp-venv/bin/python3"
script = "/opt/ala.py"

# No config file to write — aLa is a Python script, not an npm CLI
[provider.config_dir]
path = ""
format = "none"
filename = ""

[provider.prompt]
flag = "--prompt"

[provider.danger]
flag = "--danger"

# No API key required — local Ollama only
[provider.api_keys]
optional = true
