[provider]
name = "claude"
aliases = ["anthropic"]
emoji = "🎭"
binary = "claude"
install_package = "@anthropic-ai/claude-code"

[provider.install]
kind = "npm"
package = "@anthropic-ai/claude-code"

[provider.config_dir]
path = ".claude"
format = "json"
filename = "settings.json"
mcp_key = "mcpServers"
# Remote (socket) MCP servers: claude-code wants type+url+headers (not gemini's httpUrl).
mcp_http_style = "claude"

[provider.prompt]
flag = "-p"

[provider.system_prompt]
source_file = "PROMPT.md"
# Agent-specific identity, prepended to the embedded BASE guardrails.
persona = "You are Claude Code, Anthropic's coding agent."

[provider.danger]
flag = "--permission-mode bypassPermissions"

[provider.model]
flag = "--model"
env_source = "CODEX_DEFAULT_MODEL"

[provider.api_keys]
target = "ANTHROPIC_API_KEY"
chain = ["ANTHROPIC_API_KEY"]

[provider.validation]
flags = ["--model", "-p", "--resume", "--continue"]
danger_flags = ["--permission-mode"]

[provider.login]
command = """set -euo pipefail; export PATH="/usr/local/share/npm-global/bin:${PATH}"; echo "[nemesis8] Starting Claude Code login..."; claude login"""
