[provider]
name = "ollama"
aliases = ["ollama-cloud", "local"]
emoji = "🦙"
binary = "codex"
install_package = "@openai/codex"

[provider.install]
# Reuses the codex CLI; the actual model server runs on the host.
kind = "host"

[provider.config_dir]
path = ".codex"
format = "toml"
filename = "config.toml"
mcp_key = "mcp_servers"

[provider.prompt]
exec_subcommand = "exec"

[provider.system_prompt]
env_var = "CODEX_INSTRUCTIONS"
source_file = "PROMPT.md"

[provider.danger]
flag = "--dangerously-bypass-approvals-and-sandbox"
env_vars = ["CODEX_UNSAFE_ALLOW_NO_SANDBOX=1"]

[provider.model]
flag = "--model"
# A real Ollama Cloud tag (the old qwen3.5:397b-cloud wasn't one, which is why
# Codex couldn't find metadata). Override per-session with --model or the
# new-session modal. context_window/max_output_tokens are written into the
# generated Codex config.toml so Codex sizes context correctly instead of
# warning + guessing.
default = "qwen3-coder:480b-cloud"
context_window = 262144
max_output_tokens = 32768
local_daemon_env = "OLLAMA_HOST"
local_daemon_default_url = "http://localhost:11434"

[provider.api_keys]
target = "OPENAI_API_KEY"
chain = ["OPENAI_API_KEY"]
write_to_config = true
optional = true

[provider.validation]
flags = ["--model"]
danger_flags = ["--dangerously-bypass-approvals-and-sandbox"]

[provider.hooks]
requires_git_init = true
supports_sessions = true
session_dirs = [".codex/sessions"]

# NOTE: do NOT put CODEX_DEFAULT_MODEL here — env_overrides are applied via
# set_var in entry.rs and would clobber a model picked in the new-session modal
# (issue #65). The fallback default lives in [provider.model] default below.
[provider.env_overrides]
OPENAI_BASE_URL = "http://host.docker.internal:11434/v1"
OPENAI_API_KEY = "ollama"

[provider.login]
command = """set -euo pipefail; echo "[nemesis8] ollama provider uses local Ollama — run 'ollama signin' on the host if using cloud models."; codex login"""
