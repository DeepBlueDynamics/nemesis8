# OpenCode — sst/opencode, the terminal AI coding agent (npm `opencode-ai`).
# Built for local/open-weight models (Qwen 3, Gemma 4, …) with strict
# tool-calling. n8 fronts the host Ollama daemon: local models are discovered
# and listed first in the new-session modal, and entry.rs enumerates them into
# this config's provider.ollama.models so opencode can actually select them.
[provider]
name = "opencode"
aliases = ["oc"]
emoji = "🦅"
binary = "opencode"
install_package = "opencode-ai"

[provider.install]
kind = "npm"
package = "opencode-ai"

[provider.config_dir]
# opencode reads $XDG_CONFIG_HOME/opencode/opencode.json. n8 sets
# XDG_CONFIG_HOME=/opt/nemesis8 (= CODEX_HOME), so the path is "opencode"
# (NOT ".config/opencode" — XDG overrides the ~/.config default).
# No mcp_key: opencode's MCP schema differs from the codex/gemini shapes and it
# ships capable built-in tools (read/write/edit/bash/grep) — MCP-less for now.
path = "opencode"
format = "json"
filename = "opencode.json"
mcp_key = ""

# Base config merged into opencode.json every session: a custom Ollama provider
# pointing at the host daemon. entry.rs adds provider.ollama.models (the live
# local model list) on top — opencode rejects any model not enumerated here.
[provider.config_defaults]
"$schema" = "https://opencode.ai/config.json"

[provider.config_defaults.provider.ollama]
npm = "@ai-sdk/openai-compatible"
name = "Ollama (local)"

[provider.config_defaults.provider.ollama.options]
baseURL = "http://host.docker.internal:11434/v1"

[provider.prompt]
# Non-interactive: `opencode run "<prompt>"`.
exec_subcommand = "run"

[provider.danger]
# NOTE: --dangerously-skip-permissions is a `run`-only flag; opencode's default
# (TUI) command rejects it → help + exit 1 in interactive mode. So gate via
# CONFIG instead: permission="allow" auto-approves everything for BOTH `opencode
# run` and the interactive TUI. Merged into opencode.json only in danger mode.
config_merge = { permission = "allow" }

[provider.model]
# opencode takes `--model provider/model`. Local picks come through as
# `ollama/<model>` (local_daemon_model_prefix), matching the enumerated config.
flag = "--model"
env_source = "CODEX_DEFAULT_MODEL"
# Local model discovery (Ollama /api/tags). local_daemon_env reads OLLAMA_HOST,
# which env_overrides points at the host so the in-container fetch resolves; the
# host-side modal fetch falls back to localhost. Models show "(local)" first.
# default_url is the HOST modal's fallback (it can't resolve host.docker.internal
# — that's container→host only). The in-container entry fetch instead reads
# OLLAMA_HOST, set to host.docker.internal by env_overrides below.
local_daemon_env = "OLLAMA_HOST"
local_daemon_default_url = "http://localhost:11434"
local_daemon_model_prefix = "ollama/"

# Enumerate the local models into opencode's MAIN config file, as a map keyed by
# id with tools:true (opencode rejects un-enumerated / non-tool-flagged models).
# The provider wrapper (npm/options) is supplied by config_defaults above.
[provider.local_models]
models_key = "provider.ollama.models"
shape = "map"

[provider.api_keys]
# Multi-provider: opencode reads its own env keys (forwarded by build_env) /
# `opencode auth`. Local ollama needs none.
optional = true

[provider.env_overrides]
HOME = "/opt/nemesis8"
# Container reaches the host daemon here; the host-side modal uses localhost.
OLLAMA_HOST = "http://host.docker.internal:11434"

[provider.hooks]
# opencode stores sessions in SQLite (~/.local/share/opencode/opencode.db), not
# flat files, so n8's file-based resume can't enumerate them — opencode manages
# resume itself (`opencode run -c` / `-s <id>`). Mark unsupported here.
supports_sessions = false
