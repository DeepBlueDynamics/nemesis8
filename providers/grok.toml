# Grok Build — xAI's terminal coding agent (beta, launched 2026-05-25).
# NOTE: its installer ships the binary as a versioned file and symlinks the
# bare `grok` name — install-providers.py's locator must include symlinks
# (it does, since the 2026-06-11 fix) or the build fails despite a good install.
# Binary is `grok`; runs xAI's grok-build-0.1 model. Auth: XAI_API_KEY env
# (forwarded from the host) or a browser OAuth flow on first run for
# SuperGrok / X Premium Plus subscribers.
[provider]
name = "grok"
aliases = ["grok-build", "xai"]
emoji = "🪐"
binary = "grok"
install_package = ""

[provider.install]
kind = "curl"
url = "https://x.ai/cli/install.sh"
binary_name = "grok"

[provider.config_dir]
# Grok Build reads MCP servers from ~/.grok/config.toml (verified via
# `grok mcp add` + `grok mcp doctor` in the image, 2026-06-14): the Codex
# `[mcp_servers.NAME]` shape — command/args for stdio, type/url for remote —
# which grok accepts as-is (no per-server `enabled` needed). config.toml also
# holds grok's own [cli] / OAuth state, so write_provider_config MERGES the
# servers table in rather than overwriting. Relative to CODEX_HOME (= HOME =
# /opt/nemesis8 inside the container, per env_overrides below).
path = ".grok"
format = "toml"
filename = "config.toml"
mcp_key = "mcp_servers"
# config.toml is co-owned (grok keeps [cli]/[marketplace]/OAuth here), so merge
# the servers table in rather than overwriting. Codex leaves this false and
# regenerate clean each session — immune to the CLI persisting a schema-drifting
# value (the codex model_availability_nux breakage).
merge = true

[provider.prompt]
# One-shot/headless: grok -p "prompt" (also supports --output-format json /
# streaming-json, not needed here).
flag = "-p"

[provider.system_prompt]
source_file = "PROMPT.md"
# Agent-specific identity, prepended to the embedded BASE guardrails.
persona = "You are Grok, xAI's coding agent."

[provider.danger]
# Auto-approve all actions (Grok Build defaults to Plan Mode which blocks
# edits until approved; this flag is its yolo mode).
flag = "--always-approve"

# No --model CLI flag documented (model switching is the /model command
# inside the TUI). Omit `flag` so we don't pass one.
[provider.model]
env_source = "CODEX_DEFAULT_MODEL"

[provider.api_keys]
target = "XAI_API_KEY"
chain = ["XAI_API_KEY", "GROK_API_KEY"]
optional = true

[provider.validation]
flags = ["-p"]
danger_flags = ["--always-approve"]

[provider.env_overrides]
# Keep ~/.grok (config + OAuth state) inside the persistent volume.
HOME = "/opt/nemesis8"
# PRIVACY HARD-OFF (2026-07-12): grok's CLI ships trace + codebase upload
# telemetry. Kill both via xAI's documented env switches — workspaces mounted
# into agents are private repos; nothing leaves the box. Belt-and-braces with
# [provider.config_defaults] below ([telemetry]/[harness]); keep BOTH in sync.
GROK_TELEMETRY_TRACE_UPLOAD = "0"
GROK_TELEMETRY_ENABLED = "0"

# Merged into ~/.grok/config.toml every session (write_provider_config applies
# config_defaults to co-owned merge=true files too). Config-file form of the
# same telemetry hard-off as env_overrides above.
[provider.config_defaults.telemetry]
trace_upload = false

[provider.config_defaults.harness]
disable_codebase_upload = true

[provider.hooks]
supports_sessions = true
resume_flag = "--resume"
session_dirs = [".grok/sessions"]

[provider.login]
# First interactive run triggers the browser sign-in. (NOTE: [provider.login]
# isn't wired into the login path yet — issue #39 phase 2 / TOML-login gap.
# XAI_API_KEY is the reliable auth route inside containers.)
command = """set -euo pipefail; export PATH="/usr/local/bin:${PATH}"; echo "[nemesis8] Starting Grok Build sign-in..."; grok"""
