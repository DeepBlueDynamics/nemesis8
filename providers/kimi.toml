[provider]
name = "kimi"
aliases = ["kimi-k2"]
binary = "qwen"
install_package = "@qwen-code/qwen-code"

[provider.config_dir]
path = ".qwen"
format = "json"
filename = "settings.json"
mcp_key = "mcpServers"

[provider.prompt]
flag = "-p"

[provider.system_prompt]
source_file = "PROMPT.md"

[provider.danger]
flag = "--dangerously-skip-permissions"

[provider.model]
flag = "--model"
default = "kimi-k2.5:cloud"

[provider.env_overrides]
OPENAI_BASE_URL = "http://host.docker.internal:11434/v1"
OPENAI_API_KEY = "ollama"
OPENAI_MODEL = "kimi-k2.5:cloud"

[provider.validation]
flags = ["--model", "-p"]
danger_flags = ["--dangerously-skip-permissions"]

[provider.login]
command = """set -euo pipefail; export PATH="/usr/local/share/npm-global/bin:${PATH}"; echo "[nemesis8] kimi uses Ollama cloud — run 'ollama signin' on the host if not already authenticated."; qwen"""
