[provider]
name = "qwen"
aliases = ["alibaba", "dashscope"]
binary = "qwen"
install_package = "qwen-coder-cli"

[provider.config_dir]
path = ".qwen"
format = "json"
filename = "settings.json"
mcp_key = "mcpServers"

[provider.prompt]
flag = "-p"

[provider.system_prompt]
source_file = "PROMPT.md"

[provider.danger]
flag = "--dangerously-skip-permissions"

[provider.model]
flag = "--model"
env_source = "CODEX_DEFAULT_MODEL"

[provider.api_keys]
target = "DASHSCOPE_API_KEY"
chain = ["DASHSCOPE_API_KEY", "QWEN_API_KEY"]

[provider.validation]
flags = ["--model", "-p"]
danger_flags = ["--dangerously-skip-permissions"]

[provider.login]
command = """set -euo pipefail; export PATH="/usr/local/share/npm-global/bin:${PATH}"; echo "[nemesis8] Set DASHSCOPE_API_KEY in your environment to authenticate."; qwen --help"""
