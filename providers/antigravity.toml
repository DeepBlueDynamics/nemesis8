[provider]
name = "antigravity"
aliases = ["agy"]
emoji = "🛸"
binary = "agy"
install_package = ""
# agy sandboxes file writes to its own session dir ($HOME/.gemini/antigravity-cli/
# <id>/) unless told what the workspace is. `--add-dir <dir>` adds the mounted
# project so generated files land in /workspace/<name>, not the internal folder.
workspace_flag = "--add-dir"

[provider.install]
# PINNED for reproducible builds. The "tools registered but not enabled" MCP issue
# turned out to be the config DOUBLE-MAP, not an agy version regression — n8's
# config_dir.mirror_paths (writing mcp_config.json to BOTH .gemini/antigravity-cli/
# and .gemini/config/) fixes it on current agy, incl. external servers like blender.
# So we track a recent, confirmed-good version (1.0.10) instead of dodging a version.
# agy's install.sh is latest-only, so the `tarball` kind pins it: resolves the
# per-version manifest, sha512-verifies, installs. Bump as newer agy is validated.
# Tracking: nemesis8#76  ·  upstream: google-antigravity/antigravity-cli#39
kind = "tarball"
manifest_base = "https://storage.googleapis.com/antigravity-public/antigravity-cli"
version = "1.0.10"
binary_name = "agy"
# The tarball ships a single `antigravity` binary; install it as `agy` (+ alias).
archive_member = "antigravity"

[provider.config_dir]
# Per docs: ~/.gemini/antigravity-cli/mcp_config.json (Antigravity inherited
# Gemini's home dir). Relative to CODEX_HOME inside the container.
path = ".gemini/antigravity-cli"
format = "json"
filename = "mcp_config.json"
mcp_key = "mcpServers"
# agy inherits Gemini's config schema (which uses `httpUrl` for streamable-HTTP
# MCP servers) but its connector resolver only handles command/url — it rejects
# `httpUrl` with "no connector can handle spec (command='', url='')". So drop
# native HTTP registry servers (e.g. `hyperia`) here; the stdio hyperia-mcp shim
# covers it. Flip to false if/when agy implements httpUrl.
http_mcp_unsupported = true
# agy keeps a per-server schema cache at <path>/mcp/<server>/; purge it when a
# tool is deleted so stale tool-schemas don't ghost.
cache_subdir = "mcp"
# agy gates MCP tool *invocation* behind permissions.allow in settings.json,
# loaded ONCE at startup. Without pre-population every connected tool errors
# "not enabled for server" and the agent shells out instead. Pre-fill it with
# mcp(<server>/*) per server so tools are callable from the first token.
# (pointer + entry use the defaults: /permissions/allow and mcp({server}/*).)
mcp_allowlist_file = "settings.json"
# agy still MERGES ~/.gemini/config/mcp_config.json (the Gemini-global path) in
# addition to its own .gemini/antigravity-cli/ dir — and on Windows its execution
# sandbox reads ONLY that global copy. So we DON'T sweep it (deleting it leaves the
# UI showing tools the sandbox can't call — the classic "registered but blind" bug);
# we MIRROR the current config into it each session. The write truncates, so no
# stale servers (gnosis-*, ask.py) can strand.
mirror_paths = [".gemini/config/mcp_config.json"]

[provider.prompt]
# agy uses --prompt / -p for one-shot mode and --prompt-interactive / -i
# for "initial prompt then interactive continue". Plain `agy` is interactive.
flag = "-p"

[provider.system_prompt]
env_var = "ANTIGRAVITY_INSTRUCTIONS"
source_file = "PROMPT.md"
# Agent-specific identity, prepended to the embedded BASE guardrails.
persona = "You are Antigravity, Google's agentic coding CLI (agy)."

[provider.danger]
# agy's yolo flag is --dangerously-skip-permissions (not -y like gemini).
flag = "--dangerously-skip-permissions"

# agy has no --model flag yet. Omit `flag` so we don't pass one; if/when
# agy exposes a model selector, add `flag = "--model"` (or whatever).
[provider.model]
env_source = "CODEX_DEFAULT_MODEL"

[provider.api_keys]
# Antigravity authenticates via OAuth → system keyring (Keychain on macOS,
# Credential Manager on Windows, Secret Service on Linux). There's no
# documented API key env var yet; chain is best-effort fallbacks.
target = ""
chain = ["ANTIGRAVITY_API_KEY", "GOOGLE_API_KEY", "GEMINI_API_KEY"]
optional = true

[provider.validation]
# Flags confirmed against `agy --help`. agy has no --version flag.
flags = ["-p", "--prompt"]
danger_flags = ["--dangerously-skip-permissions"]

[provider.env_overrides]
HOME = "/opt/nemesis8"

[provider.hooks]
# agy stores each conversation as a single .pb (protobuf) file at
# ~/.gemini/antigravity-cli/conversations/<uuid>.pb. resume_flag passes
# the UUID via --conversation.
supports_sessions = true
resume_flag = "--conversation"
session_dirs = [".gemini/antigravity-cli/conversations"]

[provider.login]
command = """set -euo pipefail; export PATH="/usr/local/bin:${PATH}"; echo "[nemesis8] Starting Antigravity login..."; agy /login"""
env_vars = ["OAUTH_CALLBACK_PORT=8766", "OAUTH_CALLBACK_HOST=0.0.0.0"]
ports = ["8766:8766"]
