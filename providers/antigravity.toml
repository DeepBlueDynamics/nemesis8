[provider]
name = "antigravity"
aliases = ["agy"]
binary = "agy"
install_package = ""

[provider.install]
kind = "curl"
url = "https://antigravity.google/cli/install.sh"
# Binary name to look for after the installer runs (defaults to provider.binary
# if omitted). Symlinked onto /usr/local/bin so every user in the container
# can find it.
binary_name = "agy"

[provider.config_dir]
# Per docs: ~/.gemini/antigravity-cli/mcp_config.json (Antigravity inherited
# Gemini's home dir). Relative to CODEX_HOME inside the container.
path = ".gemini/antigravity-cli"
format = "json"
filename = "mcp_config.json"
mcp_key = "mcpServers"

[provider.prompt]
# TBD — verify from `agy --help`. Best guess based on Gemini lineage.
flag = "-p"

[provider.system_prompt]
env_var = "ANTIGRAVITY_INSTRUCTIONS"
source_file = "PROMPT.md"

[provider.danger]
# TBD — Gemini used `-y` for autoconfirm; assuming Antigravity kept it.
# Update once we see actual `agy --help` flags.
flag = "-y"

[provider.model]
flag = "--model"
env_source = "CODEX_DEFAULT_MODEL"

[provider.api_keys]
# Antigravity authenticates via OAuth → system keyring (Keychain on macOS,
# Credential Manager on Windows, Secret Service on Linux). There's no
# documented API key env var yet; chain is best-effort fallbacks.
target = ""
chain = ["ANTIGRAVITY_API_KEY", "GOOGLE_API_KEY", "GEMINI_API_KEY"]
optional = true

[provider.validation]
# Only --version is firmly documented in public sources today.
# Expand once `agy --help` is captured from a real install.
flags = ["--version"]
danger_flags = []

[provider.env_overrides]
HOME = "/opt/codex-home"

[provider.hooks]
# Session resume / session_dirs TBD. Antigravity has persistent history but
# the on-disk layout isn't yet documented. Disabled until verified.
supports_sessions = false
session_dirs = []

[provider.login]
command = """set -euo pipefail; export PATH="/usr/local/bin:${PATH}"; echo "[nemesis8] Starting Antigravity login..."; agy /login"""
env_vars = ["OAUTH_CALLBACK_PORT=8766", "OAUTH_CALLBACK_HOST=0.0.0.0"]
ports = ["8766:8766"]
