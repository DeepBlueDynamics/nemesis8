# Blender — drive a running Blender instance from any agent via the BlenderMCP
# server (https://github.com/ahujasid/blender-mcp), launched as `uvx blender-mcp`
# (uv/uvx ships in the base image; blender-mcp is fetched on first use).
#
# Requires the BlenderMCP addon running inside Blender on the HOST. The agent
# runs in a container, so it reaches the host's Blender socket via
# host.docker.internal (BLENDER_HOST), default port 9876 — not the container's
# own localhost. Set BLENDER_PORT to match the addon if you changed it.
#
# Enable it per-workspace from the tools picker (toggle "blender") or by adding
# "blender" to mcp_tools.
# NOTE: absolute path to uvx — the agent sanitizes the MCP subprocess env, so a
# bare "uvx" isn't on PATH. And uvx's generated launcher shells out to
# realpath/dirname/python, so HOME (uv's cache) + a PATH must be set explicitly.
[server]
name = "blender"
command = "/usr/local/bin/uvx"
args = ["blender-mcp"]
enabled_by_default = false

[server.env]
HOME = "/opt/nemesis8"
PATH = "/usr/local/bin:/usr/bin:/bin"
BLENDER_HOST = "host.docker.internal"
BLENDER_PORT = "9876"
