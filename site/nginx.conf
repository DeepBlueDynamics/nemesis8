server {
    listen 8080;
    server_name _;

    # Serve install scripts directly — these URLs must stay stable forever
    location = /install.sh {
        root /usr/share/nginx/html;
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "no-cache";
    }

    location = /install.ps1 {
        root /usr/share/nginx/html;
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "no-cache";
    }

    # Everything else → deepbluedynamics.com
    location / {
        return 301 https://deepbluedynamics.com$request_uri;
    }
}
