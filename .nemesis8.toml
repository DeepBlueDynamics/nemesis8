# nemesis8 project config
# Copy this file to your project directory and customize.

workspace_mount_mode = "named"
codex_cli_version = "latest"
# Built-in binary servers are always on (no entry needed): nuts-files (files),
# shivvr (embeddings), ask (second opinion — Claude/Gemini/OpenAI).
# (Retired gnosis-files-* + agent-chat.py dropped — gone from the image.)
mcp_tools = [
  "agentmail.py",
  "calculate.py",
  "elevenlabs-tts.py",
  "grub-crawler.py",
  "google-gemini.py",
  "serpapi-search.py",
  "transcribe-wav.py",
  "pdf-reader.py",
  "open-meteo.py",
  "claude-vision.py",
  "hyperia-mcp.py",
  "blender",
]

[env]
BLENDER_BRIDGE_URL = "http://host.docker.internal:8787"

# Gateway session roots (defaults are applied if omitted)
CODEX_GATEWAY_SESSION_DIRS = "/opt/nemesis8/.codex/sessions,/workspace/.codex-gateway-sessions"
CODEX_GATEWAY_SECURE_SESSION_DIR = "/opt/nemesis8/.codex/sessions/secure"
# Uncomment to enforce secure-session token
# CODEX_GATEWAY_SECURE_TOKEN = "choose-a-secret"

CODEX_GATEWAY_WATCH_PATHS = "./temp"
CODEX_GATEWAY_WATCH_PATTERN = "**/*"
CODEX_GATEWAY_WATCH_PROMPT_FILE = "./examples/MONITOR.md"
CODEX_SYSTEM_PROMPT_FILE = "./PROMPT.md"

SOME_SERVICE_URL = "https://api.example.com"
CODEX_CHAR_DIR = "/workspace/characters"

env_imports = [
  "SERVICE_ENGINE_URL",
  "SERVICE_ENGINE_TIMEOUT",
  "MOLTBOOK_API_KEY",
  "MOLTBOOK_BASE_URL",
  "MOLTBOOK_POLL_SECONDS",
]

[integrations]
hyperia = true

# ── Extra mounts ─────────────────────────────────────────────────
# Add host paths to mount into the container workspace.
# Sessions are already accessible via the main nemesis8-home mount.
# Example:
# [[mounts]]
# host = "/path/on/host"       # Linux/macOS
# host = 'C:\Path\To\Folder'   # Windows (single quotes avoid TOML escaping)
# container = "/workspace/data"
# mode = "rw"                  # rw (default) or ro
