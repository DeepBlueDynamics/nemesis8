name: Build and push nemesis8-base

on:
  # The base is the heavy, stable foundation that `n8 build` pulls — rebuild it
  # ONLY when its inputs actually change, or on demand. A `paths` filter is
  # honored for BRANCH pushes (unlike tag pushes, where it's silently ignored —
  # which is why every v* tag used to republish the base). Version tags now
  # build just the agent binaries (release.yml); they never touch the base.
  push:
    branches:
      - main
    paths:
      - 'Dockerfile.base'
      - 'requirements.txt'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: deepbluedynamics/nemesis8-base
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
