name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: nemesis8
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: nemesis8
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: nemesis8.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: nemesis8
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: nemesis8

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install OpenSSL (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Sign (Windows)
        if: runner.os == 'Windows'
        uses: azure/trusted-signing-action@v0.5.1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: nuts-services
          certificate-profile-name: hyperia-signing
          files-folder: target/${{ matrix.target }}/release
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign + notarize (macOS)
        if: runner.os == 'macOS'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          # Graceful skip: if signing secrets aren't configured in this repo,
          # ship UNSIGNED rather than failing the release.
          if [ -z "${CSC_LINK:-}" ] || [ -z "${APPLE_TEAM_ID:-}" ]; then
            echo "::warning::macOS signing secrets not set — shipping UNSIGNED."
            exit 0
          fi
          BIN="target/${{ matrix.target }}/release/nemesis8"
          # Import the Developer ID Application cert into a throwaway keychain.
          echo "$CSC_LINK" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          KC="$RUNNER_TEMP/build.keychain-db"
          KP="$(openssl rand -base64 24)"
          security create-keychain -p "$KP" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KP" "$KC"
          security import "$RUNNER_TEMP/cert.p12" -k "$KC" -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KP" "$KC" >/dev/null
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | sed 's/"//g')
          IDENTITY="Developer ID Application: DeepBlue Dynamics LLC ($APPLE_TEAM_ID)"
          codesign --sign "$IDENTITY" --options runtime --timestamp --force --verbose "$BIN"
          codesign --verify --verbose=2 "$BIN"
          # Notarize. A bare CLI Mach-O can't be stapled (only .app/.dmg/.pkg),
          # so we submit a zip; Gatekeeper checks notarization online on first run.
          ( cd "$(dirname "$BIN")" && /usr/bin/zip -q "$RUNNER_TEMP/n8.zip" nemesis8 )
          xcrun notarytool submit "$RUNNER_TEMP/n8.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          security delete-keychain "$KC" || true
          echo "macOS binary signed + notarized."

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../nemesis8-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path ${{ matrix.artifact }} -DestinationPath ../../../nemesis8-${{ github.ref_name }}-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: nemesis8-${{ github.ref_name }}-${{ matrix.target }}
          path: nemesis8-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
